<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álvaro Olivares V. | Tarjeta de Presentación | </title>
<style>
  :root{
    --charcoal: #1a1a1a;
    --concrete: #8c8880;
    --accent: #c9a04a;
    --line: #e5e2dc;
    --bg: #fafaf8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #ece9e3;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px 20px;
    /* Necesario para el efecto 3D */
    perspective: 1000px; 
  }

  /* Contenedor de la tarjeta que maneja las dimensiones y la perspectiva */
  .card-container {
    width: 400px;
    height: 520px; /* Altura fija para que el giro sea fluido y simétrico */
    cursor: pointer;
    perspective: 1000px;
  }

  /* La tarjeta física que rotará */
  .card{
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);
  }

  /* Clase que activa el giro */
  .card.flipped {
    transform: rotateY(180deg);
  }

  /* Ambas caras comparten estas propiedades básicas */
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  /* Cara frontal (Por defecto) */
  .card-front {
    /* Ya está orientada al frente */
  }

  /* Cara trasera (Rotada 180 grados) */
  .card-back {
    transform: rotateY(180deg);
    background: var(--charcoal);
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
  }

  /* --- Estilos Frontal --- */
  .top{
    display:flex;
    align-items:center;
    gap: 20px;
    padding: 34px 32px 26px;
    border-bottom: 1px solid var(--line);
  }

  .avatar{
    width: 68px; height: 68px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink:0;
  }

  .name-block .name{
    font-size: 20px;
    font-weight: 700;
    color: var(--charcoal);
    letter-spacing: 0.3px;
  }

  .name-block .subtitle{
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
    font-weight: 600;
  }

  .mid{
    padding: 24px 32px;
    display:flex;
    align-items:flex-start;
    gap: 14px;
  }

  .mid .bar{
    width: 3px;
    align-self: stretch;
    background: var(--accent);
    flex-shrink:0;
  }

  .mid p{
    font-size: 13px;
    color: var(--concrete);
    line-height: 1.7;
  }

  .mid p b{ color: var(--charcoal); }

  .contacts{
    padding: 4px 32px 30px;
    display:grid;
    grid-template-columns: 1fr;
    gap: 2px;
  }

  .contacts a{
    display:flex;
    align-items:center;
    justify-content:space-between;
    text-decoration:none;
    color: var(--charcoal);
    font-size: 13px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }

  .contacts a:last-child{ border-bottom:none; }

  .contacts .label{
    color: var(--concrete);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .contacts .value{
    font-weight: 600;
  }

  .bottom{
    background: var(--charcoal);
    padding: 22px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top: auto; /* Empuja el footer al fondo de la tarjeta */
  }

  .bottom .qr-wrap{
    display:flex;
    align-items:center;
    gap: 12px;
  }

  .bottom .qr-link {
    display: block;
    line-height: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .bottom .qr-link:hover {
    transform: scale(1.03);
    opacity: 0.9;
  }

  .bottom img.qr{
    width: 56px; height:56px;
    border-radius:4px;
    background:#fff;
    padding:3px;
    cursor: pointer;
  }

  .bottom .qr-text{
    font-size: 10px;
    color: #b8b4ab;
    line-height:1.5;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .bottom .mark{
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight:700;
    writing-mode: vertical-rl;
  }

  /* --- Estilos Reverso --- */
  .back-logo {
    width: 140px;
    height: 140px;
    border-radius: 8px;
    object-fit: cover;
    margin-bottom: 30px;
    border: 2px solid var(--accent);
  }

  .back-web {
    color: #FFFFFF;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 10px 20px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    transition: background 0.3s, color 0.3s;
  }

  .back-web:hover {
    background: var(--accent);
    color: var(--charcoal);
  }
</style>
</head>
<body>

<!-- Contenedor externo -->
<div class="card-container" onclick="girarTarjeta(event)">
  
  <!-- Estructura interna de la tarjeta -->
  <div class="card" id="myCard">

    <!-- CARA FRONTAL -->
    <div class="card-face card-front">
      <div class="top">
        <img class="avatar" src="https://github.com/Olochile/CardAOV/raw/main/AO.jpg" alt="AOV">
        <div class="name-block">
          <div class="name">Álvaro Olivares V.</div>
          <div class="subtitle">Constructor Civil P.U.C.</div>
        </div>
      </div>
<div style="text-align: left; font-size: 12px; font-weight: 600; color: var(--concrete); letter-spacing: 2px; text-transform: uppercase; padding: 20px 32px 0; margin-bottom: -14px;">
  Constructora AVITA SpA. 
</div>
      <div class="mid">
        <div class="bar"></div>
        <p>
          
          <b>Gerente de Contratos de Construcción</b><br>
          Administrador de Obras
        </p>
      </div>

      <div class="contacts">
        <a href="tel:+56957157425">
          <span class="label">Teléfono</span>
          <span class="value">+56 9 5715 7425</span>
        </a>
        <a href="mailto:aolivares@avita.cl">
          <span class="label">Correo</span>
          <span class="value">aolivares@avita.cl</span>
        </a>
        <a href="http://wa.me/56957157425" target="_blank">
          <span class="label">WhatsApp</span>
          <span class="value">Enviar mensaje</span>
        </a>
          
      </div>

      <div class="bottom">
        <div class="qr-wrap">
          <a href="https://drive.usercontent.google.com/u/0/uc?id=1CgCMGPaTJlVlcklqNhrYNEldr8eyzS5S&export=download" class="qr-link" title="Descargar contacto">
              <img class="qr" src="https://github.com/Olochile/wCard/raw/main/wCard.svg?sanitize=true" alt="Código QR">
          </a>
          <div class="qr-text">Escanea o presiona<br>para guardar<br>contacto</div>
        </div>
        <div class="mark">AOV</div>
      </div>
    </div>

    <!-- CARA TRASERA -->
    <div class="card-face card-back">
      <img class="back-logo" src="https://github.com/Olochile/wCard/raw/main/AvitaQ.png" alt="Logo">
      <!-- Ajusta este href con tu dominio real -->
      <a href="https://www.avita.cl" target="_blank" class="back-web">Visitar Sitio Web</a>
    </div>

  </div>
</div>

<script>
function girarTarjeta(event) {
  // Evitamos que la tarjeta gire si el usuario hace clic en un enlace activo (los del menú o el QR)
  if (event.target.closest('a')) {
    return;
  }
  
  const card = document.getElementById('myCard');
  card.classList.toggle('flipped');
}
</script>

</body>
</html>
